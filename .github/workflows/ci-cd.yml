name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Verify App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile backend/app.py backend/__init__.py app.py scripts/verify_mock_backend_flow.py

      - name: Verify mocked backend flow
        run: python scripts/verify_mock_backend_flow.py

      - name: Remove root .env before Compose validation
        run: rm -f .env

      - name: Validate Docker Compose
        env:
          COMPOSE_DISABLE_ENV_FILE: 1
        run: docker compose --env-file .env.example config

      - name: Build backend image
        run: docker build -f backend/Dockerfile.backend -t fresher-connect-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.frontend -t fresher-connect-frontend:ci .

  publish:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: prep
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner}/fresher-connect-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/fresher-connect-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.backend_image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.backend
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Frontend image metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.frontend_image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
