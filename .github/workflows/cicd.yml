name: CICD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to EC2 after publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend checks
        run: |
          python -m compileall backend scripts
          python scripts/verify_mock_backend_flow.py

      - name: Run frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Validate Docker files
        env:
          COMPOSE_DISABLE_ENV_FILE: 1
          BACKEND_IMAGE: ghcr.io/example/fresher-connect-backend:test
          FRONTEND_IMAGE: ghcr.io/example/fresher-connect-frontend:test
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml --env-file .env.example config
          docker compose -f docker-compose.ec2.yml config
          docker build -t fresher-connect-backend:ci ./backend
          docker build -t fresher-connect-frontend:ci ./frontend

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create image names
        id: meta
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner}/fresher-connect-backend:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/fresher-connect-frontend:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=ghcr.io/${owner}/fresher-connect-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=ghcr.io/${owner}/fresher-connect-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_latest }}

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_latest }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: publish
    if: (github.event_name == 'push' && vars.ENABLE_EC2_DEPLOY == 'true') || (github.event_name == 'workflow_dispatch' && inputs.deploy)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY" && exit 1)
          test -n "${{ secrets.EC2_ENV_FILE_B64 }}" || (echo "Missing EC2_ENV_FILE_B64" && exit 1)
          test -n "${{ secrets.GHCR_READ_TOKEN }}" || (echo "Missing GHCR_READ_TOKEN" && exit 1)

      - name: Prepare deploy files
        shell: bash
        env:
          BACKEND_IMAGE: ${{ needs.publish.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.publish.outputs.frontend_image }}
        run: |
          APP_DIR="${{ secrets.EC2_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="/opt/fresher-connect"
          fi
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

          printf '%s' "${{ secrets.EC2_ENV_FILE_B64 }}" | base64 --decode > .env

          {
            echo "BACKEND_IMAGE=$BACKEND_IMAGE"
            echo "FRONTEND_IMAGE=$FRONTEND_IMAGE"
          } > .images.env

          GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
          if [ -z "$GHCR_USERNAME" ]; then
            GHCR_USERNAME="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          fi
          echo "GHCR_USERNAME=$GHCR_USERNAME" >> "$GITHUB_ENV"

      - name: Configure SSH
        shell: bash
        run: |
          EC2_PORT="${{ secrets.EC2_PORT }}"
          if [ -z "$EC2_PORT" ]; then
            EC2_PORT="22"
          fi
          echo "EC2_PORT=$EC2_PORT" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$EC2_PORT" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files to EC2
        shell: bash
        run: |
          ssh -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p '$APP_DIR'"
          scp -P "$EC2_PORT" docker-compose.ec2.yml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$APP_DIR/docker-compose.yml"
          scp -P "$EC2_PORT" .env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$APP_DIR/.env"
          scp -P "$EC2_PORT" .images.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$APP_DIR/.images.env"

      - name: Deploy on EC2
        shell: bash
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "bash -lc '
            set -e
            cd \"$APP_DIR\"
            echo \"$GHCR_READ_TOKEN\" | docker login ghcr.io -u \"$GHCR_USERNAME\" --password-stdin
            docker compose --env-file .env --env-file .images.env -f docker-compose.yml pull
            docker compose --env-file .env --env-file .images.env -f docker-compose.yml up -d --remove-orphans
            docker compose --env-file .env --env-file .images.env -f docker-compose.yml ps
          '"
