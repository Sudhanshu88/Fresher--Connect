<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Login | Fresher Connect</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      params.set("role", "company");
      var query = params.toString();
      window.location.replace("login.html" + (query ? "?" + query : "") + window.location.hash);
    }());
  </script>
</head>
<body></body>
</html>
