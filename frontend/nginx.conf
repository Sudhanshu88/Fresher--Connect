server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /components/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location /styles/ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location /services/ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location /pages/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
