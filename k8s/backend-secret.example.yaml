apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: fresher-connect
type: Opaque
stringData:
  SECRET_KEY: "replace-with-a-long-random-secret"
  JWT_SECRET_KEY: "replace-with-a-long-random-secret"
  MONGODB_URI: "mongodb+srv://user:password@cluster.example.mongodb.net/fresher_connect"
  S3_BUCKET: "replace-with-your-bucket-name"
  S3_ENDPOINT_URL: ""
  AWS_ACCESS_KEY_ID: "replace-if-you-are-not-using-irsa"
  AWS_SECRET_ACCESS_KEY: "replace-if-you-are-not-using-irsa"
