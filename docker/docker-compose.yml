services:
  mongodb:
    image: mongo:7
    container_name: fresher-connect-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ../database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fresher-connect-backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-before-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-before-production}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/fresher_connect}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-2097152}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
      DISABLE_SEED_DATA: ${DISABLE_SEED_DATA:-false}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PREFIX: ${S3_PREFIX:-uploads}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-240}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fresher-connect-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongodb-data:
